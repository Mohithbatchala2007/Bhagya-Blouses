<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Bhagya Blouses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        :root {
            --primary-pink: #ff9ec7;
            --secondary-pink: #ff6fa5;
            --dark-pink: #e91e63;
            --light-pink: #ffeef5;
            --gold: #d4af37;
            --light-gold: #f4e5c2;
            --cream: #fff8f3;
            --text-dark: #333;
            --text-light: #666;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffeef5, #fff8f3);
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 70px; /* Space for mobile nav */
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }

        /* Desktop Navigation */
        .desktop-nav {
            display: none;
            position: fixed;
            top: 0;
            width: 100%;
            height: 75px;
            background: linear-gradient(135deg, rgba(255, 158, 199, 0.9), rgba(255, 111, 165, 0.9));
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .desktop-nav .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 0 30px;
        }

        .desktop-nav .logo {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .desktop-nav .nav-menu {
            display: flex;
            gap: 30px;
        }

        .desktop-nav .nav-item {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .desktop-nav .nav-item:hover {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        .desktop-nav .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* Mobile Navigation - Fixed for Small Screens */
        .mobile-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, rgba(255, 158, 199, 0.85), rgba(255, 111, 165, 0.85));
            backdrop-filter: blur(15px);
            border-top: 2px solid var(--gold);
            border-radius: 20px 20px 0 0;
            z-index: 1000;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.15);
            padding: 0;
        }

        .mobile-nav .nav-items {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: space-around;
            align-items: center;
            padding: 5px 0;
        }

        .mobile-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: white;
            text-decoration: none;
            font-size: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px;
            width: 18%;
            height: 100%;
        }

        .mobile-nav .nav-item i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .mobile-nav .nav-item:hover, .mobile-nav .nav-item.active {
            color: var(--gold);
        }

        .mobile-nav .nav-item:hover i, .mobile-nav .nav-item.active i {
            transform: translateY(-2px);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        .mobile-nav .nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 3px;
            background: var(--gold);
            border-radius: 0 0 3px 3px;
        }

        /* Page Header */
        .page-header {
            padding: 100px 20px 40px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 42px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--dark-pink), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            font-size: 18px;
            color: var(--text-light);
        }

        /* Cart Section */
        .cart-section {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* Cart Items */
        .cart-items {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item:hover {
            background: var(--light-pink);
            border-radius: 10px;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--light-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-image i {
            font-size: 40px;
            color: var(--secondary-pink);
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .cart-item-model {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .cart-item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-pink);
            margin-bottom: 10px;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-pink);
            border-radius: 25px;
            padding: 5px;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--secondary-pink);
        }

        .quantity-btn:hover {
            background: var(--secondary-pink);
            color: white;
            transform: scale(1.1);
        }

        .quantity-value {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #f44336;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            transform: scale(1.2);
        }

        /* Empty Cart State */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.8s ease;
        }

        .empty-cart-icon {
            font-size: 80px;
            color: var(--secondary-pink);
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .empty-cart-title {
            font-size: 32px;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .empty-cart-description {
            font-size: 16px;
            color: var(--text-light);
            max-width: 500px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .browse-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--secondary-pink), var(--primary-pink));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 111, 165, 0.4);
        }

        .browse-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 111, 165, 0.6);
        }

        /* Order Summary */
        .order-summary {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--text-dark);
            position: relative;
            padding-bottom: 15px;
        }

        .summary-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary-pink), var(--gold));
            border-radius: 2px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .summary-row.discount {
            color: #4caf50;
            font-weight: 600;
        }

        .summary-row.total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 20px;
            font-weight: 700;
            color: var(--dark-pink);
        }

        .promo-code {
            margin: 25px 0;
            position: relative;
        }

        .promo-input {
            width: 100%;
            padding: 12px 50px 12px 15px;
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .promo-input:focus {
            outline: none;
            border-color: var(--secondary-pink);
            background: rgba(255, 255, 255, 0.3);
        }

        .apply-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--secondary-pink);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .apply-btn:hover {
            background: var(--dark-pink);
        }

        .place-order-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--gold), var(--light-gold));
            color: var(--text-dark);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .place-order-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6);
        }

        .place-order-btn:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        .promo-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .promo-message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
            border: 1px solid rgba(76, 175, 80, 0.3);
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .promo-message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #c62828;
            border: 1px solid rgba(244, 67, 54, 0.3);
            display: block;
            animation: shake 0.5s ease;
        }

        /* Order Form Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 24px;
            color: var(--dark-pink);
        }

        .modal-close {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--light-pink);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--secondary-pink);
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--secondary-pink);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary-pink);
            box-shadow: 0 0 0 3px rgba(255, 111, 165, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary-pink), var(--primary-pink));
            color: white;
            box-shadow: 0 4px 12px rgba(255, 111, 165, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255, 111, 165, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        /* Responsive Design */
        @media (min-width: 1025px) {
            .desktop-nav {
                display: block;
            }
            .mobile-nav {
                display: none;
            }
            body {
                padding-bottom: 0;
            }
        }

        @media (max-width: 1024px) {
            .desktop-nav {
                display: none;
            }
            .mobile-nav {
                display: flex;
            }
            .cart-section {
                grid-template-columns: 1fr;
            }
            .order-summary {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 32px;
            }
            .cart-item {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .cart-item-actions {
                width: 100%;
                justify-content: center;
            }
        }

        /* Small Screen Fixes for Mobile Navigation */
        @media (max-width: 425px) {
            .mobile-nav {
                height: 65px;
            }
            .mobile-nav .nav-item {
                font-size: 9px;
            }
            .mobile-nav .nav-item i {
                font-size: 18px;
            }
        }

        @media (max-width: 375px) {
            .mobile-nav {
                height: 60px;
            }
            .mobile-nav .nav-item {
                font-size: 8px;
                gap: 2px;
            }
            .mobile-nav .nav-item i {
                font-size: 16px;
            }
        }

        @media (max-width: 360px) {
            .mobile-nav {
                height: 60px;
            }
            .mobile-nav .nav-item {
                font-size: 8px;
                padding: 3px;
            }
            .mobile-nav .nav-item i {
                font-size: 16px;
            }
        }

        @media (max-width: 320px) {
            .mobile-nav {
                height: 55px;
            }
            .mobile-nav .nav-item {
                font-size: 7px;
                padding: 2px;
                gap: 1px;
            }
            .mobile-nav .nav-item i {
                font-size: 14px;
            }
            .mobile-nav .nav-item.active::before {
                width: 20px;
                height: 2px;
            }
        }
    </style>
</head>
<body>
    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
        <div class="container">
            <div class="logo">Bhagya Blouses</div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="designs.html" class="nav-item">
                    <i class="fas fa-shirt"></i> Our Designs
                </a>
                <a href="booking.html" class="nav-item">
                    <i class="fas fa-calendar-check"></i> Book Appointment
                </a>
                <a href="about.html" class="nav-item">
                    <i class="fas fa-circle-info"></i> About
                </a>
                <a href="cart.html" class="nav-item active">
                    <i class="fas fa-cart-shopping"></i> Cart
                </a>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation - Fixed for Small Screens -->
    <nav class="mobile-nav">
        <div class="nav-items">
            <a href="index.html" class="nav-item">
                <i class="fas fa-house"></i>
                <span>Home</span>
            </a>
            <a href="designs.html" class="nav-item">
                <i class="fas fa-shirt"></i>
                <span>Designs</span>
            </a>
            <a href="booking.html" class="nav-item">
                <i class="fas fa-calendar-check"></i>
                <span>Book</span>
            </a>
            <a href="about.html" class="nav-item">
                <i class="fas fa-circle-info"></i>
                <span>About</span>
            </a>
            <a href="cart.html" class="nav-item active">
                <i class="fas fa-cart-shopping"></i>
                <span>Cart</span>
            </a>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1>Shopping Cart</h1>
        <p>Review your selections and complete your order</p>
    </header>

    <!-- Cart Section -->
    <section class="cart-section">
        <!-- Cart Items -->
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be dynamically loaded here -->
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
            <h2 class="summary-title">Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">₹0</span>
            </div>
            <div class="summary-row">
                <span>Shipping Charges</span>
                <span id="shipping">₹0</span>
            </div>
            <div class="summary-row">
                <span>Taxes</span>
                <span id="tax">₹0</span>
            </div>
            <div class="summary-row discount" id="discountRow" style="display: none;">
                <span>Discount</span>
                <span id="discount">-₹0</span>
            </div>
            <div class="summary-row total">
                <span>Total Amount</span>
                <span id="total">₹0</span>
            </div>
            
            <div class="promo-code">
                <input type="text" class="promo-input" id="promoInput" placeholder="Enter promo code">
                <button class="apply-btn" id="applyPromo">Apply</button>
                <div class="promo-message" id="promoMessage"></div>
            </div>
            
            <button class="place-order-btn" id="placeOrderBtn" disabled>Place Order</button>
        </div>
    </section>

    <!-- Order Form Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Complete Your Order</h2>
                <button class="modal-close" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="orderForm">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Full Address *</label>
                        <textarea id="address" name="address" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="pincode">Pincode *</label>
                        <input type="text" id="pincode" name="pincode" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelOrder">Cancel</button>
                        <button type="submit" class="btn btn-primary">Send Order on WhatsApp</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Cart Module
        const CartModule = (function() {
            // Private variables
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let discountPercentage = 0;
            let isInternational = false;

            // Promo codes with their discount percentages
            const promoCodes = {
                'BAGYABLOUSES': 10,
                'KODINGWALA': 8,
                'SUMMERUP@BAGYABLOUSES': 15,
                'WINTERBAGYABLOUSES': 15,
                'FESTIVAL123BAGYABLOUSES': 25,
                'DIWALIBAGYABLOUSES123': 20,
                'BAGYABLOUSESVINAYAKA123': 10,
                'MARRIAGESwithBAGYABLOUSES': 20
            };

            // DOM Elements
            const cartItemsContainer = document.getElementById('cartItems');
            const placeOrderBtn = document.getElementById('placeOrderBtn');
            const promoInput = document.getElementById('promoInput');
            const applyPromoBtn = document.getElementById('applyPromo');
            const promoMessage = document.getElementById('promoMessage');
            const discountRow = document.getElementById('discountRow');
            const subtotalEl = document.getElementById('subtotal');
            const shippingEl = document.getElementById('shipping');
            const taxEl = document.getElementById('tax');
            const discountEl = document.getElementById('discount');
            const totalEl = document.getElementById('total');
            const orderModal = document.getElementById('orderModal');
            const orderForm = document.getElementById('orderForm');
            const closeModalBtn = document.getElementById('closeModal');
            const cancelOrderBtn = document.getElementById('cancelOrder');

            // Initialize module
            function init() {
                // Load cart from localStorage
                loadCartFromStorage();

                // Check if cart is empty
                if (cart.length === 0) {
                    // Show empty cart state
                    showEmptyCart();
                    
                    // Disable place order button
                    placeOrderBtn.disabled = true;
                } else {
                    // Show cart items
                    renderCartItems();
                    
                    // Enable place order button
                    placeOrderBtn.disabled = false;
                }

                // Setup event listeners
                setupEventListeners();

                // Detect country for shipping
                detectCountry();
            }

            // Setup event listeners
            function setupEventListeners() {
                // Apply promo code
                applyPromoBtn.addEventListener('click', applyPromoCode);
                promoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        applyPromoCode();
                    }
                });

                // Place order button click
                placeOrderBtn.addEventListener('click', () => {
                    if (cart.length > 0) {
                        orderModal.classList.add('active');
                    }
                });

                // Close modal
                closeModalBtn.addEventListener('click', () => {
                    orderModal.classList.remove('active');
                });

                // Cancel order
                cancelOrderBtn.addEventListener('click', () => {
                    orderModal.classList.remove('active');
                });

                // Submit order form
                orderForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    submitOrder();
                });

                // Close modal when clicking outside
                orderModal.addEventListener('click', (e) => {
                    if (e.target === orderModal) {
                        orderModal.classList.remove('active');
                    }
                });
            }

            // Load cart from localStorage
            function loadCartFromStorage() {
                const savedCart = localStorage.getItem('cart');
                if (savedCart) {
                    cart = JSON.parse(savedCart);
                }
            }

            // Save cart to localStorage
            function saveCartToStorage() {
                localStorage.setItem('cart', JSON.stringify(cart));
            }

            // Detect country for shipping
            function detectCountry() {
                // In a real application, you would use a geolocation API
                // For demo purposes, we'll assume domestic shipping
                isInternational = false;
                updateShipping();
            }

            // Show empty cart state
            function showEmptyCart() {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <h2 class="empty-cart-title">Your Cart is Empty</h2>
                        <p class="empty-cart-description">
                            You are not allowed to place an order without selecting products.
                            Please choose a blouse design to continue.
                        </p>
                        <a href="designs.html" class="browse-btn">Browse Designs</a>
                    </div>
                `;
            }

            // Render cart items
            function renderCartItems() {
                if (cart.length === 0) {
                    showEmptyCart();
                    return;
                }

                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item" data-id="${item.id}">
                        <div class="cart-item-image">
                            ${item.image ? `<img src="${item.image}" alt="${item.title}">` : `<i class="fas fa-shirt"></i>`}
                        </div>
                        <div class="cart-item-details">
                            <h3 class="cart-item-title">${item.title}</h3>
                            <p class="cart-item-model">Model: ${item.model}</p>
                            <p class="cart-item-price">₹${item.price}</p>
                            <div class="cart-item-actions">
                                <div class="quantity-control">
                                    <button class="quantity-btn decrease-qty">
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <span class="quantity-value">${item.quantity}</span>
                                    <button class="quantity-btn increase-qty">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                                <button class="remove-btn">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Add event listeners for cart items
                document.querySelectorAll('.increase-qty').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = parseInt(e.target.closest('.cart-item').dataset.id);
                        increaseQuantity(id);
                    });
                });

                document.querySelectorAll('.decrease-qty').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = parseInt(e.target.closest('.cart-item').dataset.id);
                        decreaseQuantity(id);
                    });
                });

                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = parseInt(e.target.closest('.cart-item').dataset.id);
                        removeFromCart(id);
                    });
                });

                updateSummary();
            }

            // Increase quantity
            function increaseQuantity(id) {
                const item = cart.find(item => item.id === id);
                if (item) {
                    item.quantity++;
                    saveCartToStorage();
                    renderCartItems();
                }
            }

            // Decrease quantity
            function decreaseQuantity(id) {
                const item = cart.find(item => item.id === id);
                if (item && item.quantity > 1) {
                    item.quantity--;
                    saveCartToStorage();
                    renderCartItems();
                }
            }

            // Remove from cart
            function removeFromCart(id) {
                cart = cart.filter(item => item.id !== id);
                saveCartToStorage();
                renderCartItems();
                
                // Check if cart is now empty
                if (cart.length === 0) {
                    placeOrderBtn.disabled = true;
                }
            }

            // Update shipping charges
            function updateShipping() {
                if (isInternational) {
                    shippingEl.textContent = "Will be calculated";
                } else if (cart.length > 0) {
                    shippingEl.textContent = "₹120";
                } else {
                    shippingEl.textContent = "₹0";
                }
            }

            // Apply promo code
            function applyPromoCode() {
                const code = promoInput.value.trim().toUpperCase();
                
                if (!code) {
                    showPromoMessage("Please enter a promo code", "error");
                    return;
                }
                
                if (promoCodes[code]) {
                    discountPercentage = promoCodes[code];
                    showPromoMessage(`Promo code applied! You got ${discountPercentage}% discount`, "success");
                    discountRow.style.display = "flex";
                    updateSummary();
                } else {
                    showPromoMessage("Invalid Promo Code", "error");
                }
            }

            // Show promo message
            function showPromoMessage(message, type) {
                promoMessage.textContent = message;
                promoMessage.className = `promo-message ${type}`;
                
                // Clear message after 3 seconds
                setTimeout(() => {
                    promoMessage.className = "promo-message";
                }, 3000);
            }

            // Update order summary
            function updateSummary() {
                const subtotal = cart.reduce((total, item) => total + (item.price * item.quantity), 0);
                const shipping = isInternational ? 0 : (cart.length > 0 ? 120 : 0);
                const tax = Math.round(subtotal * 0.05); // 5% tax
                const discountAmount = Math.round(subtotal * (discountPercentage / 100));
                const total = subtotal + shipping + tax - discountAmount;

                // Update display
                subtotalEl.textContent = `₹${subtotal}`;
                taxEl.textContent = `₹${tax}`;
                
                if (discountPercentage > 0) {
                    discountEl.textContent = `-₹${discountAmount}`;
                }
                
                totalEl.textContent = `₹${total}`;
                
                updateShipping();
            }

            // Submit order via WhatsApp
            function submitOrder() {
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const address = document.getElementById('address').value;
                const pincode = document.getElementById('pincode').value;
                
                // Calculate order totals
                const subtotal = cart.reduce((total, item) => total + (item.price * item.quantity), 0);
                const shipping = isInternational ? 0 : (cart.length > 0 ? 120 : 0);
                const tax = Math.round(subtotal * 0.05);
                const discountAmount = Math.round(subtotal * (discountPercentage / 100));
                const total = subtotal + shipping + tax - discountAmount;
                
                // Format products list
                const productsList = cart.map(item => 
                    `${item.title} - Quantity: ${item.quantity} - Price: ₹${item.price * item.quantity}`
                ).join('\n');
                
                // Create WhatsApp message
                const message = `Hello Bhagya Blouses,

I want to place an order.

Name: ${name}
Phone: ${phone}
Address: ${address}
Pincode: ${pincode}

Products Ordered:
 ${productsList}

Subtotal: ₹${subtotal}
Shipping: ${isInternational ? "Will be calculated" : "₹" + shipping}
Taxes: ₹${tax}
 ${discountPercentage > 0 ? `Discount: -₹${discountAmount}\n` : ""}Total Amount: ₹${total}

Please confirm my order.`;
                
                // Open WhatsApp
                const encodedMessage = encodeURIComponent(message);
                const whatsappUrl = `https://wa.me/917337281880?text=${encodedMessage}`;
                window.open(whatsappUrl, '_blank');
                
                // Close modal and clear cart
                orderModal.classList.remove('active');
                cart = [];
                saveCartToStorage();
                renderCartItems();
                placeOrderBtn.disabled = true;
                
                // Reset form
                orderForm.reset();
            }

            // Public API
            return {
                init
            };
        })();

        // Initialize the cart module when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            CartModule.init();
        });
    </script>
</body>
</html>
